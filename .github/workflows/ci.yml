name: CI

# Continuous integration for the PDF editor.
#
# Milestone 1 (plans/milestone-1-ci-quality-debt.md) final state: every gate
# below is BLOCKING except the two explicitly carved out as advisory.
#   * `dependency-audit` (Task 4 / finding F2) runs pip-audit over the declared
#     requirement files and FAILS the build on any known advisory. The
#     ocr-requirements.txt leg stays advisory (surya-ocr's transitive
#     Pillow/transformers pins have no current upstream fix; see TODOS.md).
#   * `lint` blocks on the full selected ruff rule set. The E402 import-order
#     backlog (91 findings) was cleared in two PRs: preamble removal (repo-root
#     sys.path inserts collapsed into a single pattern) followed by the
#     test_scripts/_bootstrap.py module (hybrid script/pytest path bootstrap) —
#     E402 now blocks like every other selected rule.
#   * `typecheck` runs `mypy model/ utils/` and is BLOCKING (PR-7): the former
#     `self.doc`-is-`Any | None` design gaps were resolved via typed local binds
#     plus a handful of runtime-inert casts/annotations, so `mypy model/ utils/`
#     is now clean and must stay that way.
#   * `layer-boundaries` blocks on all four import-linter contracts
#     (model-no-controller-view, model-no-qt, utils-no-controller-view-model,
#     view-no-model) plus the threading.Thread grep over view/+controller/.
#   * `test` blocks on the import-light dependency/F9 security regression
#     suite; the full pytest run needs the heavy optional + platform-specific
#     stack (surya/torch, win32print, pyautogui) and is run locally, surfaced
#     here as an advisory step.
#   * `test-functional` is a cross-platform matrix job (windows-latest +
#     ubuntu-latest) that runs the broader pytest suite. As of PR-11
#     (plans/milestone-1-ci-quality-debt.md), the windows-latest leg is
#     BLOCKING (flipped on the strength of 3 consecutive green PR-10 runs);
#     ubuntu-latest stays advisory pending the Qt offscreen-teardown SIGBUS,
#     issue #19. As of PR-12, the windows leg also gates on coverage: the
#     `--cov-fail-under=0` override that shipped with PR-11 (to surface an
#     advisory number safely) is removed, so pyproject.toml's
#     `[tool.coverage.report] fail_under = 75` now governs on CI too — one
#     number, one source of truth. Evidence: three consecutive PR-11 CI runs
#     measured TOTAL coverage at a stable 78% (local .venv measures 79%),
#     giving 75% three points of headroom against real, CI-measured signal.
#
# All tool/dependency installs are pinned via constraints-ci.txt to the
# maintainer's .venv versions (except pip-audit — see that file's header).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency vulnerability audit (pip-audit)
    # Matrix so both platform-gated print backends are resolved+audited:
    # pycups (Linux/Darwin marker) on ubuntu, pywin32 (Windows marker) on windows.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install CUPS headers (so pycups can resolve on Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcups2-dev
      - name: Install pip-audit
        # Deliberately unconstrained: the auditor must use a current advisory DB.
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit core + optional requirements (BLOCKING)
        # Exits non-zero on any known advisory -> fails the build.
        run: pip-audit -r requirements.txt -r optional-requirements.txt --progress-spinner off
      - name: Audit OCR extra (advisory; documented upstream-blocked residuals)
        # surya-ocr transitively pins a vulnerable Pillow/transformers that no release
        # can currently avoid (see ocr-requirements.txt + TODOS.md). Surfaced, not gated.
        continue-on-error: true
        timeout-minutes: 15
        run: pip-audit -r ocr-requirements.txt --progress-spinner off

  lint:
    name: ruff (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install ruff
        run: python -m pip install --upgrade pip && python -m pip install ruff -c constraints-ci.txt
      - name: ruff check (blocking, full rule set)
        run: ruff check . --output-format=github

  typecheck:
    name: mypy model/ utils/ (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install core deps + mypy (stub parity with the local baseline)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -c constraints-ci.txt
          python -m pip install mypy -c constraints-ci.txt
      - name: mypy model/ utils/ (blocking)
        run: python -m mypy model/ utils/

  layer-boundaries:
    name: Layer boundaries (CLAUDE.md §2 — all contracts blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install import-linter
        run: python -m pip install --upgrade pip && python -m pip install import-linter -c constraints-ci.txt
      - name: lint-imports (blocking; contracts with no known violations)
        run: lint-imports --config pyproject.toml --contract model-no-controller-view --contract model-no-qt --contract utils-no-controller-view-model --contract view-no-model
      - name: No threading.Thread in view/ or controller/ (blocking)
        # PySide6 threading rule (CLAUDE.md §3, §9): UI-adjacent code must use
        # QThread + signals, not raw threading.Thread.
        run: |
          if grep -rn "threading\.Thread" view/ controller/; then
            echo "::error::threading.Thread found in view/ or controller/ — use QThread + Signals instead"
            exit 1
          fi

  test:
    name: Security regression tests
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Qt offscreen runtime libs
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0
      - name: Install core + test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -c constraints-ci.txt
          python -m pip install pytest packaging -c constraints-ci.txt
      - name: Show resolved environment (pin visibility)
        run: python -m pip list
      - name: Dependency + OCR-weight security regression suite (BLOCKING)
        run: |
          pytest -q \
            test_scripts/test_security_pillow_floor.py \
            test_scripts/test_security_ocr_requirements.py \
            test_scripts/test_security_requirements_encoding.py \
            test_scripts/test_security_ocr_weights.py
      - name: Full security suite (advisory; needs the heavy optional/platform stack)
        continue-on-error: true
        run: pytest -q test_scripts/test_security_*.py

  test-functional:
    # NOTE: the name is double-quoted at the YAML level — the "#19" inside a
    # plain (unquoted) scalar starts a YAML comment (space + '#'), truncating
    # the ${{ }} expression and breaking workflow parsing outright.
    name: "Functional suite (${{ matrix.os == 'windows-latest' && 'windows - BLOCKING' || 'ubuntu - advisory, issue #19' }})"
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            # Coverage gate (PR-12): pyproject.toml's [tool.coverage.report]
            # fail_under=75 now governs this leg -- no override here. Evidence:
            # PR-11's 3 consecutive green runs measured a stable 78% TOTAL on
            # CI (local .venv measures 79%), so 75% has real headroom.
            cov_args: "--cov --cov-report=term --cov-report=xml"
          - os: ubuntu-latest
            cov_args: ""
    runs-on: ${{ matrix.os }}
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Qt offscreen runtime libs + CUPS headers (pycups build dep)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libcups2-dev
      - name: Install core + optional + test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r optional-requirements.txt -c constraints-ci.txt
          python -m pip install pytest packaging pytest-cov -c constraints-ci.txt
          # test_security_packaging.py's real-artifact test (`python -m build
          # --no-isolation`) needs build/setuptools/wheel on PATH; pinned in
          # constraints-ci.txt (Packaging toolchain section) to the
          # maintainer's .venv versions so CI doesn't drift independently.
          # Previously missing entirely -> "No module named build" failed
          # every CI run.
          python -m pip install build setuptools wheel -c constraints-ci.txt
      - name: Show resolved environment (pin visibility)
        run: python -m pip list
      - name: Run functional suite (windows-latest BLOCKING; ubuntu-latest advisory)
        # Gitignored test_files/ fixtures are absent on CI, so fixture-dependent
        # tests are deselected via needs_fixtures (PR-10); they still run
        # locally where test_files/ exists. local_only (real hardware) tests
        # are deselected on every leg. windows-latest flipped to BLOCKING in
        # PR-11 on the strength of 3 consecutive green PR-10 runs (1553 passed /
        # 33 skipped / 15 deselected / 0 failed, stable); ubuntu-latest stays
        # advisory pending the Qt offscreen-teardown SIGBUS, issue #19 --
        # continue-on-error is conditional on matrix.os so only the ubuntu
        # leg's failures are swallowed.
        continue-on-error: ${{ matrix.os == 'ubuntu-latest' }}
        timeout-minutes: 40
        run: python -m pytest -q -m "not local_only and not needs_fixtures" --junitxml=pytest-report.xml ${{ matrix.cov_args }}
      - name: Upload junit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.os }}
          path: pytest-report.xml
          if-no-files-found: warn
      - name: Upload coverage.xml (windows leg; advisory numbers, see PR-12)
        if: always() && matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-windows
          path: coverage.xml
          if-no-files-found: warn
