name: CI

# Continuous integration for the PDF editor.
#
# The headline gate (Task 4 / finding F2) is `dependency-audit`: it runs pip-audit
# over the declared requirement files and FAILS the build on any known advisory.
# `lint` and `test` are wired in too, but their blocking scope is deliberately
# scoped to what is green today:
#   * ruff blocks on all selected rules except the remaining import-order backlog
#     (91 E402 findings after the first-stage cleanup), which is being cleaned up
#     separately.
#   * the test job blocks on the import-light dependency/F9 security regression suite;
#     the full pytest run needs the heavy optional + platform-specific stack
#     (surya/torch, win32print, pyautogui) and is run locally, surfaced here as an
#     advisory step.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency vulnerability audit (pip-audit)
    # Matrix so both platform-gated print backends are resolved+audited:
    # pycups (Linux/Darwin marker) on ubuntu, pywin32 (Windows marker) on windows.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install CUPS headers (so pycups can resolve on Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcups2-dev
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit core + optional requirements (BLOCKING)
        # Exits non-zero on any known advisory -> fails the build.
        run: pip-audit -r requirements.txt -r optional-requirements.txt --progress-spinner off
      - name: Audit OCR extra (advisory; documented upstream-blocked residuals)
        # surya-ocr transitively pins a vulnerable Pillow/transformers that no release
        # can currently avoid (see ocr-requirements.txt + TODOS.md). Surfaced, not gated.
        continue-on-error: true
        timeout-minutes: 15
        run: pip-audit -r ocr-requirements.txt --progress-spinner off

  lint:
    name: ruff (blocking, excluding E402 backlog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install ruff
        run: python -m pip install --upgrade pip ruff
      - name: ruff check (blocking except E402)
        run: ruff check . --ignore E402 --output-format=github

  layer-boundaries:
    name: Layer boundaries (CLAUDE.md §2 — advisory until clean, see TODOS.md)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install import-linter
        run: python -m pip install --upgrade pip import-linter
      - name: lint-imports (blocking; contracts with no known violations)
        run: lint-imports --config pyproject.toml --contract model-no-controller-view --contract model-no-qt
      - name: lint-imports (advisory; known violations tracked in TODOS.md)
        continue-on-error: true
        run: lint-imports --config pyproject.toml --contract utils-no-controller-view-model --contract view-no-model
      - name: No threading.Thread in view/ or controller/ (blocking)
        # PySide6 threading rule (CLAUDE.md §3, §9): UI-adjacent code must use
        # QThread + signals, not raw threading.Thread.
        run: |
          if grep -rn "threading\.Thread" view/ controller/; then
            echo "::error::threading.Thread found in view/ or controller/ — use QThread + Signals instead"
            exit 1
          fi

  test:
    name: Security regression tests
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Qt offscreen runtime libs
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0
      - name: Install core + test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest packaging
      - name: Dependency + OCR-weight security regression suite (BLOCKING)
        run: |
          pytest -q \
            test_scripts/test_security_pillow_floor.py \
            test_scripts/test_security_ocr_requirements.py \
            test_scripts/test_security_requirements_encoding.py \
            test_scripts/test_security_ocr_weights.py
      - name: Full security suite (advisory; needs the heavy optional/platform stack)
        continue-on-error: true
        run: pytest -q test_scripts/test_security_*.py
